unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

set-option -g history-limit 100000

set -g default-terminal "xterm-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

set -sg escape-time 0
set -g status-interval 0

# set -g default-command "reattach-to-user-namespace -l /bin/zsh"

# Tmux-plugins
# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-resurrect'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# run '~/.tmux/plugins/tpm/tpm'

# tmux-resurrect: keep tmux sessions alive across restarts
set -g allow-passthrough on
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'
bind -n S-Enter send-keys "\e[13;2u"

# open selected file:line in nvim (copy-mode: select text, press o)
set -g mode-keys vi
bind -T copy-mode-vi o send-keys -X copy-selection-no-clear \; run-shell 'vf "$(tmux show-buffer | tr -d "\n")"'
